<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEase - Home</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">ShopEase</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="cart.html">Cart</a></li>
      <li><a href="checkout.html">Checkout</a></li>
      <li><a href="services.html">Services</a></li>
    </ul>
  </nav>

  <section class="hero">
    <h1>Welcome to ShopEase</h1>
    <p>Your one‑stop shop for electronics, fashion, and more.</p>
    <a href="products.html" class="btn">Shop Now</a>
  </section>

  <section class="featured">
    <h2>Featured Deals</h2>
    <div class="product-grid">
      <!-- Highlight 3–4 featured products -->
      <div class="product-card">
        <img src="images/iphone.jpg" alt="iPhone 15 Pro">
        <h3>iPhone 15 Pro</h3>
        <p class="price-tag">$1299.99</p>
      </div>
      <div class="product-card">
        <img src="images/nike.jpg" alt="Nike Sneakers">
        <h3>Nike Air Sneakers</h3>
        <p class="price-tag">$89.99</p>
      </div>
      <div class="product-card">
        <img src="images/coffeemaker.jpg" alt="Coffee Maker">
        <h3>Coffee Maker</h3>
        <p class="price-tag">$59.99</p>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 ShopEase. All rights reserved.</p>
  </footer>
</body>
</html>
